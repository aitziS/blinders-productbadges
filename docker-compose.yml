services:
  mysql:
    image: mysql:5.7
    container_name: ps_mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: prestashop
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - prestashop-net

  prestashop:
    image: prestashop/prestashop:1.7.8.11-7.4-apache
    container_name: ps_shop
    depends_on:
      - mysql
    ports:
      - "8080:80"
    environment:
      DB_SERVER: mysql
      DB_NAME: prestashop
      DB_USER: root
      DB_PASSWD: admin
      DB_PREFIX: ps_
      PS_INSTALL_AUTO: 1
      PS_DOMAIN: localhost:8080
      PS_LANGUAGE: es
      PS_COUNTRY: ES
      PS_FOLDER_ADMIN: admin
      ADMIN_MAIL: admin@blinders-test.local
      ADMIN_PASSWD: Admin1234!
      PS_DEV_MODE: 1
    volumes:
      - ps_data:/var/www/html
      - ./modules/productbadges:/var/www/html/modules/productbadges
    networks:
      - prestashop-net

volumes:
  mysql_data:
  ps_data:

networks:
  prestashop-net: